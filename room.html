<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="roomStyles.css">
    <title>MR | Room booking</title>
</head>
<body>
    <header>
        <div class="left">
            <p class="logo">MR</p>
            <nav><a href="#">Контакты</a>|<a href="#">О нас</a>|<a href="#">Комнаты</a></nav>
        </div>
        <button class="sign-in" type="button">Войти</button>
    </header>

    <form action="">
        <fieldset>
            <legend>Бронирование</legend>

            <div class="form-item">
                <label for="guest_name">ФИО</label>
                <input type="text" name="guest_name" id="guest_name"/>
            </div>

            <div class="form-item">
                <label for="email">Email</label>
                <input type="email" name="email" id="email">
            </div>

            <div class="form-item">
                <label for="phone_number">Номер телефона</label>
                <input type="tel" name="phone_number" id="phone_number">
            </div>
            
            <div class="form-item">
                <label for="arrival_date">Дата приезда</label>
                <input type="date" name="arrival_date" id="arrival_date">
            </div>

            <div class="form-item">
                <label for="departure_date">Дата покидания</label>
                <input type="date" name="departure_date" id="departure_date">
            </div>
            
            <div class="form-item">
                <label>Тип комнаты</label>
                <div class="radio-group">
                    <label><input type="radio" name="room_type" value="Бюджет"> Бюджет</label>
                    <label><input type="radio" name="room_type" value="Стандарт"> Стандарт</label>
                    <label><input type="radio" name="room_type" value="Люкс"> Люкс</label>
                </div>
            </div>

            <button type="submit" id="book">Забронировать</button>
        </fieldset>
    </form>
</body>
</html>
