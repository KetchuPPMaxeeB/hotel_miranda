<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="roomStyles.css">
    <title>MR | Room booking</title>
</head>
<body>
    <header>
        <div class="left">
            <p class="logo">MR</p>
            <nav><a href="#">Контакты</a>|<a href="#">О нас</a>|<a href="#">Комнаты</a></nav>
        </div>
        <button class="sign-in" type="button">Войти</button>
    </header>

    <section class="room-display">
        <fieldset>
            <legend>Превью комнаты</legend>

            <div class="img-container-preview">
                <img src="" alt="Room preview">
            </div>

            <div class="form-item">
                <label for="room_type">Тип комнаты</label>
                <input type="text" name="room_type" id="room_type" disabled/>
            </div>

            <div class="form-item">
                <label for="price">Цена</label>
                <input type="number" name="price" id="price" disabled/>
            </div>
        </fieldset>
    </section>

    <form action="">
        <fieldset>
            <legend>Бронирование</legend>

            <div class="form-item">
                <label for="guest_name">ФИО</label>
                <input type="text" name="guest_name" id="guest_name"/>
            </div>

            <div class="form-item">
                <label for="email">Email</label>
                <input type="email" name="email" id="email">
            </div>

            <div class="form-item">
                <label for="phone_number">Номер телефона</label>
                <input type="tel" name="phone_number" id="phone_number">
            </div>
            
            <div class="form-item">
                <label for="arrive_date">Дата приезда</label>
                <input type="date" name="arrive_date" id="arrive_date">
            </div>

            <div class="form-item">
                <label for="departure_date">Дата покидания</label>
                <input type="date" name="departure_date" id="departure_date">
            </div>

            <button type="submit" id="book">Забронировать</button>
        </fieldset>
    </form>
<script src="./roomscript.js"></script>
</body>
</html>
